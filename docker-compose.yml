# TaskFlow Pro — Docker Compose (development)
# Usage: docker compose up

version: '3.9'

services:
  api:
    build:
      context: ./backend
      target: development
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/taskflow
      REDIS_URL: redis://cache:6379
      JWT_SECRET: dev_jwt_secret_change_in_production_32c
      REFRESH_SECRET: dev_refresh_secret_change_in_prod_32c
      CLIENT_URL: http://localhost:3000
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      target: development
    ports:
      - '3000:3000'
    environment:
      VITE_API_URL: http://localhost:4000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  adminer:
    image: adminer:latest
    ports:
      - '8080:8080'
    depends_on:
      - db

volumes:
  pg_data:
  redis_data:
